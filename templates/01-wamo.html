<div style="width:1280px;height:670px;background:#F5F0E8;position:relative;overflow:hidden;font-family:'Noto Serif JP',serif;box-sizing:border-box;">
  <!-- 左端縦ライン -->
  <div style="position:absolute;left:0;top:0;width:5px;height:100%;background:#3C3489;"></div>
  <!-- 右上大円 -->
  <div style="position:absolute;right:-120px;top:-120px;width:480px;height:480px;border-radius:50%;background:#3C3489;opacity:.07;"></div>
  <!-- 右下小円 -->
  <div style="position:absolute;right:60px;bottom:-80px;width:260px;height:260px;border-radius:50%;background:#8B7355;opacity:.09;"></div>
  <!-- 下部水平ライン -->
  <div style="position:absolute;left:60px;bottom:100px;right:60px;height:1px;background:#8B7355;opacity:.3;"></div>
  <!-- コンテンツ -->
  <div style="position:absolute;left:80px;top:120px;right:80px;bottom:60px;display:flex;flex-direction:column;justify-content:center;">
    <div style="font-size:13px;color:#888780;letter-spacing:.25em;margin-bottom:24px;">{{TAG}}</div>
    <div style="font-size:72px;font-weight:bold;color:#2C2C2A;line-height:1.2;margin-bottom:20px;">{{TITLE}}</div>
    <div style="font-size:20px;color:#5F5E5A;line-height:1.6;">{{SUB}}</div>
  </div>
  <!-- 日付 -->
  <div style="position:absolute;right:60px;bottom:40px;font-size:13px;color:#888780;">{{DATE}}</div>
</div>

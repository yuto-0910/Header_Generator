<div style="width:1280px;height:670px;background:#FAFAF8;position:relative;overflow:hidden;font-family:'Noto Sans JP',sans-serif;box-sizing:border-box;">
  <!-- コンテンツ -->
  <div style="position:absolute;left:100px;top:140px;right:100px;bottom:60px;display:flex;flex-direction:column;justify-content:center;">
    <!-- TAGの上の黒ライン -->
    <div style="width:40px;height:2px;background:#2C2C2A;margin-bottom:16px;"></div>
    <div style="font-size:12px;color:#B4B2A9;letter-spacing:.3em;margin-bottom:28px;">{{TAG}}</div>
    <div style="font-size:64px;font-weight:bold;color:#2C2C2A;line-height:1.2;margin-bottom:20px;">{{TITLE}}</div>
    <div style="font-size:18px;color:#888780;line-height:1.6;">{{SUB}}</div>
  </div>
  <!-- 日付 -->
  <div style="position:absolute;right:60px;bottom:40px;font-size:13px;color:#B4B2A9;">{{DATE}}</div>
</div>

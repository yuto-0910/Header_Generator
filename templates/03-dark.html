<div style="width:1280px;height:670px;background:#1C1C1A;position:relative;overflow:hidden;font-family:'Noto Sans JP',sans-serif;box-sizing:border-box;">
  <!-- 上部グラデーションライン -->
  <div style="position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(to right,#534AB7,#7F77DD);"></div>
  <!-- 右下大円 -->
  <div style="position:absolute;right:-100px;bottom:-100px;width:500px;height:500px;border-radius:50%;background:#534AB7;opacity:.08;"></div>
  <!-- コンテンツ -->
  <div style="position:absolute;left:100px;top:120px;right:100px;bottom:60px;display:flex;flex-direction:column;justify-content:center;">
    <div style="font-size:12px;color:#534AB7;letter-spacing:.25em;margin-bottom:24px;font-family:'Noto Sans JP',sans-serif;">{{TAG}}</div>
    <div style="font-size:70px;font-weight:bold;color:#F1EFE8;line-height:1.2;margin-bottom:20px;font-family:'Noto Serif JP',serif;">{{TITLE}}</div>
    <div style="font-size:18px;color:#888780;line-height:1.6;font-family:'Noto Sans JP',sans-serif;">{{SUB}}</div>
  </div>
  <!-- 日付 -->
  <div style="position:absolute;right:60px;bottom:40px;font-size:13px;color:#444441;">{{DATE}}</div>
</div>

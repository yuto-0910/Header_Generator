<div style="width:1280px;height:670px;background:#EAF3DE;position:relative;overflow:hidden;font-family:'Noto Sans JP',sans-serif;box-sizing:border-box;">
  <!-- グリッドパターン -->
  <div style="position:absolute;left:0;top:0;width:100%;height:100%;background-image:linear-gradient(#3B6D11 1px,transparent 1px),linear-gradient(90deg,#3B6D11 1px,transparent 1px);background-size:40px 40px;opacity:.07;"></div>
  <!-- 左カラーブロック -->
  <div style="position:absolute;left:0;top:0;width:420px;height:100%;background:#3B6D11;display:flex;flex-direction:column;justify-content:center;padding:60px 50px;box-sizing:border-box;">
    <div style="font-size:12px;color:#C0DD97;letter-spacing:.25em;margin-bottom:24px;">{{TAG}}</div>
    <div style="font-size:52px;font-weight:bold;color:#EAF3DE;line-height:1.2;">{{TITLE}}</div>
  </div>
  <!-- 右エリア -->
  <div style="position:absolute;left:420px;top:0;right:0;height:100%;display:flex;flex-direction:column;justify-content:center;padding:60px 60px;box-sizing:border-box;">
    <div style="font-size:22px;color:#27500A;line-height:1.7;">{{SUB}}</div>
  </div>
  <!-- 日付 -->
  <div style="position:absolute;right:60px;bottom:40px;font-size:13px;color:#639922;">{{DATE}}</div>
</div>
